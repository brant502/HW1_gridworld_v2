<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1 Gridworld Analysis</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Gridworld RL Visualizer (Flask)</h1>
        
        <div class="info-panel">
            <h3 style="margin-top:0;">Instructions:</h3>
            <p id="instruction-msg">Loading...</p>
        </div>

        <div class="controls">
            <div style="display:flex; align-items:center; gap:10px;">
                <label for="grid-n"><strong>Grid Size (n):</strong></label>
                <input type="number" id="grid-n" min="5" max="9" value="5">
                <button class="btn" onclick="initGrid()">Set Size / Render</button>
            </div>
        </div>

        <div id="grid-container" class="grid-container">
            <!-- Grid generated by JS -->
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-box" style="background: var(--start-bg);"></div> Start</div>
            <div class="legend-item"><div class="legend-box" style="background: var(--end-bg);"></div> End</div>
            <div class="legend-item"><div class="legend-box" style="background: var(--obstacle-bg);"></div> Obstacle</div>
        </div>

        <br>
        <div class="controls" style="border-top: 1px solid #ccc; padding-top: 20px;">
            <button class="btn" style="background:#0288d1;" onclick="fetchRandomPolicy()">1. Random Policy</button>
            <button class="btn" style="background:#f57c00;" onclick="fetchPolicyEvaluation()">2. Policy Evaluation (V)</button>
            <button class="btn" style="background:#388e3c;" onclick="fetchValueIteration()">3. Value Iteration (Optimal)</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
